name: Hush
options:
  bundleIdPrefix: com.bastian
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

targets:
  Hush:
    type: application
    platform: macOS
    sources:
      - path: Hush
        excludes:
          - "Resources/Assets.xcassets"
      - path: Hush/Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bastian.Hush
        INFOPLIST_FILE: Hush/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.2"
        ENABLE_APP_SANDBOX: true
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_ENTITLEMENTS: Hush/Resources/Hush.entitlements
        DEVELOPMENT_TEAM: "5A4DE87J22"
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: Hush
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - sdk: CoreAudio.framework
